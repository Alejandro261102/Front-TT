<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión</title>

  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/login.css">
</head>
<body>
  <div class="page-wrapper">

    <header class="site-header">
      <div class="container">
        <a href="../index.html" class="site-logo">Aplicación Web TT2</a>

        <nav class="site-nav" aria-label="Navegación principal">
          <ul>
            <li><a href="../index.html">INICIO</a></li>
            <li><a href="#">NOSOTROS</a></li>
            <li><a href="#">SERVICIOS</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="login-main">
      <section class="login-section">
        <div class="login-card">

          <div class="user-icon" aria-hidden="true">
            <div class="icon-head"></div>
            <div class="icon-body"></div>
          </div>

          <form class="login-form">
            <input type="email" placeholder="Correo Electrónico">
            <input type="password" placeholder="Contraseña">

            <div class="login-buttons">
              <button type="submit">Iniciar Sesión</button>
              <a href="#" class="btn-secondary">¡Registrarse!</a>
            </div>
          </form>

        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>&copy; 2026 Aplicación Web TT2. Todos los derechos reservados.</p>

        <div class="footer-links">
          <a href="../index.html">Inicio</a>
          <a href="#">Nosotros</a>
          <a href="#">Contacto</a>
        </div>
      </div>
    </footer>

  </div>
</body>
</html>
